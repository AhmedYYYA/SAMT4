<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAMT Station Asset Test</title>
<style>
body{margin:0;background:#081d33;color:#fff;font-family:Arial,sans-serif;padding:24px}h1{font-size:22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}.card{border:1px solid #d4af37;border-radius:16px;overflow:hidden;background:#020914}.card h2{font-size:14px;padding:10px 14px;margin:0}.card img{display:block;width:100%;height:auto;aspect-ratio:1672/941;object-fit:contain;background:#020914}</style>
</head>
<body>
<h1>SAMT approved animated station SVGs</h1>
<div class="grid">
  <div class="card"><h2>UAE</h2><img src="assets/stations/uae-animated.svg" alt="UAE station"></div>
  <div class="card"><h2>United Kingdom</h2><img src="assets/stations/uk-animated.svg" alt="UK station"></div>
  <div class="card"><h2>France</h2><img src="assets/stations/france-animated.svg" alt="France station"></div>
  <div class="card"><h2>United States</h2><img src="assets/stations/usa-animated.svg" alt="USA station"></div>
</div>
</body></html>
